

<div class="products-container">



<div class="products-container">
  <div class="row align-items-center mb-4 position-relative">
    
    <div class="col-4"></div>
    
    <div class="col-4 text-center">
      <h3 class="page-header m-0">Products</h3>
    </div>
    
    <div class="col-4 text-end">
      <div class="products-header">
        <button class="btn  btn-secondary " (click)="EditProducts()">
          <i class="fa fa-gear"></i> Edit Products
        </button>
      </div>
    </div>

  </div>
</div>




<div class="row">
    @for (product of Products(); track product.id) {
      <div class="col-md-4 col-lg-3 mb-4">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <div class="text-muted small mb-2">{{ product.categoryNameAr }}</div>
            <h5 class="card-title">{{ product.nameAr }}</h5>
            <p class="card-text text-danger fw-bold h4 mt-3">
              {{ product.price }}
            </p>
            <hr />
          </div>
        </div>
      </div>
    }
  </div>
</div>
