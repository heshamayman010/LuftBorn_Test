<div class="container-fluid p-4">
  <div class="d-flex gap-3 mb-4 justify-content-center">
    <button 
      class="btn" 
      [class.btn-primary]="selectedTab() === 'products'"
      [class.btn-outline-primary]="selectedTab() !== 'products'"
      (click)="selectedTab.set('products')">
      Products 
    </button>
    <button 
      class="btn" 
      [class.btn-primary]="selectedTab() === 'categories'"
      [class.btn-outline-primary]="selectedTab() !== 'categories'"
      (click)="selectedTab.set('categories')">
      Categories 
    </button>
    <button class="btn btn-secondary" (click)="goToHome()">
      <i class="bi bi-arrow-left"></i>  Home
    </button>

  </div>

  <div class="d-flex justify-content-center overflow-y-auto" style="max-height: 500px;"> 
  @if (selectedTab() === 'products') {
<app-admin-products></app-admin-products>
    
}
  
  @if (selectedTab() === 'categories') {
    <app-admin-categories></app-admin-categories>
  }

  </div>

</div>
